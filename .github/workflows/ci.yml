name: CI

# 触发时机:推送到 main / 提 PR 时自动跑
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # 允许手动触发
  workflow_dispatch:

jobs:
  syntax-check:
    name: Syntax check (${{ matrix.os }} / Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}

    # 强制使用 UTF-8 编码, 避免 Windows runner 默认 cp1252 / GBK 报 UnicodeEncodeError
    env:
      PYTHONIOENCODING: utf-8
      PYTHONUTF8: "1"

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.8", "3.10", "3.12"]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Show environment
        run: |
          python --version
          python -c "import platform; print('Platform:', platform.system(), platform.release())"

      - name: Compile check (py_compile)
        # 字节码编译, 能检出绝大多数语法错误 (语义错误如 NameError 不会暴露)
        run: python -m py_compile setup_claude_code.py

      - name: AST parse check
        # 抽象语法树解析, 比 py_compile 更严格地检查源码结构
        run: python -c "import ast; ast.parse(open('setup_claude_code.py', encoding='utf-8').read()); print('AST parse OK')"
