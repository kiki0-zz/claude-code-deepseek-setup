name: ✨ 功能建议
description: 建议新功能或改进现有功能
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 你想解决什么问题?
      placeholder: 例如:希望支持其他第三方 Anthropic 兼容端点 (如 Kimi、智谱)
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 你设想的方案
      placeholder: 例如:在脚本中加入端点选择菜单, 同时支持自定义输入
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 是否考虑过其他方案?
      placeholder: 选填
    validations:
      required: false
